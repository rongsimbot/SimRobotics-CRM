{% extends "base.html" %}
{% block content %}
<h2 style="margin-bottom:1rem">Log Interaction for {{ contact.first_name }} {{ contact.last_name }}</h2>
<div class="card">
<form method="post">
    <div class="form-row">
        <div><label>Channel</label>
            <select name="channel">
                <option value="">-- Select --</option>
                <option>Email</option><option>Phone</option><option>LinkedIn</option><option>Meeting</option><option>Other</option>
            </select>
        </div>
        <div><label>Date</label><input type="datetime-local" name="interaction_date"></div>
    </div>
    <label>Notes</label><textarea name="notes" rows="4"></textarea>
    <label>Next Action</label><input type="text" name="next_action" placeholder="Follow-up step...">
    <div style="margin-top:1.5rem;display:flex;gap:0.5rem">
        <button type="submit" class="btn btn-primary">Save</button>
        <a href="/contacts/{{ contact.id }}" class="btn btn-outline">Cancel</a>
    </div>
</form>
</div>
{% endblock %}
