{% extends "base.html" %}
{% block content %}
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
  <h2 style="margin:0;">✏️ Edit Campaign</h2>
  <a href="/commercial/campaigns/{{ campaign.id }}" class="btn btn-outline btn-sm">← Back to Campaign</a>
</div>
<div class="card">
  <form method="POST">
    <div class="form-row">
      <div style="grid-column:1/-1;">
        <label>Campaign Name *</label>
        <input type="text" name="name" value="{{ campaign.name }}" required>
      </div>
    </div>
    <label>Description</label>
    <textarea name="description" rows="3">{{ campaign.description or '' }}</textarea>
    <div class="form-row">
      <div>
        <label>Sender Name</label>
        <input type="text" name="sender_name" value="{{ campaign.sender_name or '' }}">
      </div>
      <div>
        <label>Sender Email</label>
        <input type="email" name="sender_email" value="{{ campaign.sender_email or 'info@simrobotics.com' }}">
      </div>
    </div>
    <label>Subject Template</label>
    <input type="text" name="subject_template" value="{{ campaign.subject_template or '' }}" placeholder="e.g. {{ company_name }} - Capability Statement">
    <label>Email Body Template</label>
    <textarea name="body_template" rows="15" style="font-family:monospace;">{{ campaign.body_template or '' }}</textarea>
    <div class="form-row">
      <div>
        <label>Target Sector</label>
        <input type="text" name="target_sector" value="{{ campaign.target_sector or '' }}">
      </div>
      <div>
        <label>Target Region</label>
        <input type="text" name="target_region" value="{{ campaign.target_region or '' }}">
      </div>
    </div>
    <label>Target Customer Status</label>
    <select name="target_is_customer">
      <option value="no" {% if campaign.target_is_customer == 'no' %}selected{% endif %}>Non-Customers Only</option>
      <option value="yes" {% if campaign.target_is_customer == 'yes' %}selected{% endif %}>Existing Customers Only</option>
      <option value="all" {% if campaign.target_is_customer == 'all' %}selected{% endif %}>All Companies</option>
    </select>
    <div style="margin-top:1.5rem;display:flex;gap:0.75rem;">
      <button type="submit" class="btn btn-primary">💾 Save Changes</button>
      <a href="/commercial/campaigns/{{ campaign.id }}" class="btn btn-outline">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
