{% extends "base.html" %}
{% block content %}
<h2>{% if campaign %}Edit Campaign{% else %}New Campaign{% endif %}</h2>

<form method="POST" class="card">
  <div class="form-row">
    <div>
      <label>Campaign Name *</label>
      <input type="text" name="name" value="{{ campaign.name if campaign else '' }}" required>
    </div>
    <div>
      <label>Subject Line</label>
      <input type="text" name="subject_line" value="{{ campaign.subject_line if campaign else '' }}">
    </div>
  </div>
  <div class="form-row">
    <div>
      <label>Sender Email</label>
      <input type="email" name="sender_email" value="{{ campaign.sender_email if campaign else 'info@simrobotics.com' }}">
    </div>
    <div>
      <label>Template Used</label>
      <input type="text" name="template_used" value="{{ campaign.template_used if campaign else '' }}" placeholder="e.g. capability_statement_v1">
    </div>
  </div>
  <div class="form-row">
    <div>
      <label>Audience Type *</label>
      <select name="audience_type" required>
        <option value="commercial" {% if campaign and campaign.audience_type == 'commercial' %}selected{% endif %}>Commercial</option>
        <option value="military" {% if campaign and campaign.audience_type == 'military' %}selected{% endif %}>Military</option>
        <option value="mixed" {% if campaign and campaign.audience_type == 'mixed' %}selected{% endif %}>Mixed</option>
      </select>
    </div>
    <div>
      <label>Status</label>
      <select name="status">
        <option value="draft" {% if campaign and campaign.status == 'draft' %}selected{% endif %}>Draft</option>
        <option value="scheduled" {% if campaign and campaign.status == 'scheduled' %}selected{% endif %}>Scheduled</option>
        <option value="sent" {% if campaign and campaign.status == 'sent' %}selected{% endif %}>Sent</option>
        <option value="completed" {% if campaign and campaign.status == 'completed' %}selected{% endif %}>Completed</option>
        <option value="cancelled" {% if campaign and campaign.status == 'cancelled' %}selected{% endif %}>Cancelled</option>
      </select>
    </div>
  </div>
  <div class="form-row">
    <div>
      <label>Scheduled Date</label>
      <input type="datetime-local" name="scheduled_at" value="{{ campaign.scheduled_at.strftime('%Y-%m-%dT%H:%M') if campaign and campaign.scheduled_at else '' }}">
    </div>
    <div>
      <label>Sent Date</label>
      <input type="datetime-local" name="sent_at" value="{{ campaign.sent_at.strftime('%Y-%m-%dT%H:%M') if campaign and campaign.sent_at else '' }}">
    </div>
  </div>
  <div class="form-row">
    <div>
      <label>Total Recipients</label>
      <input type="number" name="total_recipients" value="{{ campaign.total_recipients if campaign else 0 }}" min="0">
    </div>
  </div>
  <label>Notes</label>
  <textarea name="notes" rows="3">{{ campaign.notes if campaign else '' }}</textarea>

  <div style="margin-top:1.5rem;display:flex;gap:0.5rem;">
    <button type="submit" class="btn btn-primary">{% if campaign %}Save Changes{% else %}Create Campaign{% endif %}</button>
    <a href="/marketing/campaigns" class="btn btn-outline">Cancel</a>
  </div>
</form>
{% endblock %}
